<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动展示 - 流动照片墙</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <img src="logo.png" alt="扬赋人工智能协会logo" class="logo">
                <h1>扬赋人工智能协会</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">协会简介</a></li>
                    <li><a href="features.html">协会特色</a></li>
                    <li><a href="gallery.html" class="current">活动展示</a></li>
                    <li><a href="enterprise-cooperation.html">校企合作</a></li>
                    <li><a href="contact.html">联系方式</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- 流动照片墙部分 -->
        <section id="gallery" class="gallery-section">
            <div class="container">
                <h2>活动展示 - 流动照片墙</h2>
                <div class="gallery-intro">
                    <p>这里展示了协会举办的各类精彩活动照片，记录了我们共同成长的美好瞬间。滚动浏览，感受协会的活力与氛围！</p>
                </div>
                
                <!-- 流动照片墙容器 -->
                <div class="photo-gallery" id="photoGallery">
                    <!-- 照片将通过JavaScript动态生成 -->
                    <div class="loading-message">照片加载中...</div>
                </div>
                
                <script>
                    // 所有照片文件列表
                    const photoFiles = [
                        '成就 (1).png',
                        '成就 (2).png',
                        '成就 (3).png',
                        '成就 (4).png',
                        '成就 (5).png',
                        '成就 (6).png',
                        '成就 (7).png',
                        '成就 (8).png',
                        '成就 (9).png',
                        '成就 (10).png',
                        '成就 (11).png',
                        '成就 (12).png',
                        '成就 (13).png',
                        '成就 (14).png'
                    ];
                    
                    // 活动照片标题列表 - 对应每张成就图片
                    const photoCaptions = [
                        '国家一级协会授课', '部分荣誉证书', '协会户外活动', '协会工作证', 'AIPO证书',
                        'AIPO公益活动', '会长易海证书', '阿里巴巴大型活动', '副会长黄溢证书', '副会长章莹证书',
                        '会员团建活动', '活动照片', '校外活动照片', '大阪世博会展'
                    ];
                    
                    // 生成照片墙
                    function generatePhotoGallery() {
                        const galleryContainer = document.getElementById('photoGallery');
                        galleryContainer.innerHTML = ''; // 清空容器
                        
                        // 按顺序显示图片
                        photoFiles.forEach((photoFile, index) => {
                            const photoItem = document.createElement('div');
                            photoItem.className = 'photo-item';
                            photoItem.style.opacity = '0';
                            photoItem.style.transform = 'translateY(20px)';
                            photoItem.style.transition = `opacity 0.6s ease ${index * 0.1}s, transform 0.6s ease ${index * 0.1}s`;
                            
                            const img = document.createElement('img');
                            img.src = `photo/${photoFile}`;
                            img.alt = `协会成就展示 - ${photoCaptions[index] || '活动照片'}`;
                            img.className = 'photo-img';
                            
                            const caption = document.createElement('p');
                            caption.className = 'photo-caption';
                            caption.textContent = photoCaptions[index] || '协会活动';
                            
                            photoItem.appendChild(img);
                            photoItem.appendChild(caption);
                            galleryContainer.appendChild(photoItem);
                            
                            // 图片加载后显示
                            img.onload = function() {
                                setTimeout(() => {
                                    photoItem.style.opacity = '1';
                                    photoItem.style.transform = 'translateY(0)';
                                }, 100);
                            };
                            
                            // 图片加载失败时的处理
                            img.onerror = function() {
                                console.log(`无法加载图片: ${photoFile}`);
                                photoItem.style.display = 'none';
                            };
                        });
                    }
                    
                    // 页面加载完成后生成照片墙
                    document.addEventListener('DOMContentLoaded', generatePhotoGallery);
                </script>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 扬赋人工智能协会 版权所有</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
